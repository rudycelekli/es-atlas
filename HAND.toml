[hand]
name = "atlas"
display_name = "Atlas — ES Consulting AI"
description = "Enterprise AI Solutions Architect. Autonomous sales agent with web research, company analysis, competitive intelligence, and lead generation. Powered by OpenFang Agent OS."
version = "2.0.0"
author = "ES Consulting"

[schedule]
enabled = false

[tools]
required = ["web_search", "web_fetch", "web_scrape"]
